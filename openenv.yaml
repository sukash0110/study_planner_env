name: edudynamics
entrypoint: inference.py
api:
  module: study_env.api
  app: app
  host: 0.0.0.0
  port: 8501
environment:
  module: study_env.env
  class: StudyPlannerEnv
  state_model: study_env.models.StateModel
  reset_request_model: study_env.models.ResetRequest
  step_request_model: study_env.models.StepRequest
tasks:
  - easy
  - medium
  - hard
agent:
  module: runtime.inference_runner
  class: DeterministicPlannerAgent
grader:
  module: evaluation.grader_runner
  function: grade
environment_variables:
  - API_BASE_URL
  - MODEL_NAME
  - OPENAI_API_KEY
  - HF_TOKEN
